version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "ci"

  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "tooling"

  - package-ecosystem: "npm"
    directory: "/phodex-bridge"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "bridge"

  - package-ecosystem: "npm"
    directory: "/relay"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "relay"
