name: Sync Upstream

on:
  schedule:
    - cron: "17 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Merge upstream main into fork main
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api \
            -X POST \
            "repos/${GITHUB_REPOSITORY}/merge-upstream" \
            -f branch=main
