name: Sync Upstream

on:
  schedule:
    - cron: "17 12 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Prepare review branch
        id: sync
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git remote add upstream https://github.com/Emanuele-web04/remodex.git
          git fetch origin main
          git fetch upstream main

          if git merge-base --is-ancestor upstream/main origin/main; then
            echo "has_updates=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          branch="upstream-sync/main"
          git checkout -B "$branch" origin/main
          git merge --no-ff --no-edit upstream/main
          git push --force-with-lease origin "$branch"

          echo "has_updates=true" >> "$GITHUB_OUTPUT"
          echo "branch=$branch" >> "$GITHUB_OUTPUT"

      - name: Open or update review PR
        if: steps.sync.outputs.has_updates == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          branch="${{ steps.sync.outputs.branch }}"
          title="Review upstream main sync"
          body=$'This PR stages the latest `upstream/main` changes for review before they land in `main`.\n\n- Source: `Emanuele-web04/remodex:main`\n- Trigger: GitHub Actions sync workflow\n- Safety: no auto-merge; review and CI should pass before merge'

          existing_pr="$(gh pr list \
            --head "$branch" \
            --base main \
            --state open \
            --json number \
            --jq '.[0].number // ""')"

          if [[ -n "$existing_pr" ]]; then
            gh pr edit "$existing_pr" --title "$title" --body "$body"
            exit 0
          fi

          gh pr create --base main --head "$branch" --title "$title" --body "$body"
