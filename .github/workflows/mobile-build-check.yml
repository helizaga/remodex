name: Mobile Build Check

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/mobile-build-check.yml"
      - "CodexMobile/**"
  pull_request:
    paths:
      - ".github/workflows/mobile-build-check.yml"
      - "CodexMobile/**"

jobs:
  mobile-build-check:
    runs-on: macos-latest
    timeout-minutes: 30
    concurrency:
      group: mobile-build-check-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
      cancel-in-progress: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Select Xcode 26.3
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "26.3"

      - name: Cache Swift package checkouts
        uses: actions/cache@v4
        with:
          path: |
            ${{ github.workspace }}/.cache/remodex-source-packages
            ~/Library/Caches/org.swift.swiftpm
            ~/.swiftpm/cache
          key: ${{ runner.os }}-mobile-build-spm-${{ hashFiles('CodexMobile/CodexMobile.xcodeproj/project.xcworkspace/xcshareddata/swiftpm/Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-mobile-build-spm-

      - name: Build CodexMobile and tests
        env:
          CLONED_SOURCE_PACKAGES_DIR: ${{ github.workspace }}/.cache/remodex-source-packages
          DERIVED_DATA_PATH: /tmp/remodex-mobile-build-derived
        run: |
          mkdir -p "$CLONED_SOURCE_PACKAGES_DIR"
          xcodebuild \
            -project CodexMobile/CodexMobile.xcodeproj \
            -scheme CodexMobile \
            -destination "generic/platform=iOS Simulator" \
            -derivedDataPath "$DERIVED_DATA_PATH" \
            -clonedSourcePackagesDirPath "$CLONED_SOURCE_PACKAGES_DIR" \
            build-for-testing \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO
