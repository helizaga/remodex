name: Mobile Performance Check

on:
  workflow_dispatch:

jobs:
  mobile-performance-check:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Select latest stable Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Check TurnView performance against baseline
        run: ./CodexMobile/scripts/check-turnview-performance.sh

      - name: Check sidebar badge performance against baseline
        run: ./CodexMobile/scripts/check-sidebar-badge-performance.sh
