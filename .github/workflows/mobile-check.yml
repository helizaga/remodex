name: Mobile Check

on:
  push:
    paths:
      - ".github/workflows/mobile-check.yml"
      - "CodexMobile/**"
  pull_request:
    paths:
      - ".github/workflows/mobile-check.yml"
      - "CodexMobile/**"

jobs:
  reconnect-history-check:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Select latest stable Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Run reconnect and history regression slice
        run: ./CodexMobile/scripts/run-reconnect-history-tests.sh
