name: Mobile Check

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/mobile-check.yml"
      - "CodexMobile/**"
  pull_request:
    paths:
      - ".github/workflows/mobile-check.yml"
      - "CodexMobile/**"

jobs:
  reconnect-history-check:
    runs-on: macos-latest
    timeout-minutes: 30
    concurrency:
      group: mobile-check-${{ github.workflow }}-${{ github.event.pull_request.head.sha || github.sha }}
      cancel-in-progress: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Select latest stable Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Run required mobile regression slice
        run: ./CodexMobile/scripts/run-reconnect-history-tests.sh
